<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Comedor-Tech</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <h1>Comedor-Tech</h1>
  <nav class="tabs">
    <button onclick="showView('login')">Ingreso</button>
    <button onclick="showView('reserva')">Reservar</button>
    <button onclick="showView('acceso')">Control de Acceso</button>
  </nav>

  <section id="view-login"><!-- TODO --></section>
  <section id="view-reserva" hidden>
  <h2>Reservar Turno</h2>
  <label>Código universitario</label>
  <input id="codigoRes" type="text" value="221045" readonly>
  <label>Turno</label>
  <select id="turnoRes">
    <option>Turno 1 (11:30 AM - 12:15 PM)</option>
    <option>Turno 2 (12:15 PM - 01:00 PM)</option>
    <option>Turno 3 (01:00 PM - 01:45 PM)</option>
  </select>
  <button class="action" onclick="generarTicket()">Generar ticket</button>
  <div id="reservaResult"></div>
</section>
  <section id="view-acceso" hidden>
  <h2>Control de Acceso</h2>
  <label>Escanee código de ticket</label>
  <input id="codigoTicket" type="text" placeholder="TICKET-221045-2026">
  <button class="action" onclick="validarEntrada()">Validar entrada</button>
  <div id="accesoResult"></div>
</section>
  <script src="js/app.js"></script>
  <script src="js/login.js"></script>
  <script src="js/reserva.js"></script>
  <script src="js/acceso.js"></script>
</body>
</html>
